<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="提供公開 Instagram 與 X 貼文的私人、暫存媒體清單。">
    <title>SNS Media List</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="brand-header">
        <p class="eyebrow">SNS MEDIA LIST</p>
        <h1>將一則公開貼文整理成清晰的下載清單。</h1>
        <p class="lede">分析支援的 Instagram 或 X 貼文，逐一下載可直接串流的媒體項目。</p>
      </header>

      <section class="analyze-panel" aria-labelledby="analyze-heading">
        <div class="section-kicker">01 / 來源</div>
        <h2 id="analyze-heading">分析公開貼文</h2>
        <form id="extraction-form">
          <label for="post-url">貼文 URL</label>
          <div class="input-row">
            <input id="post-url" name="url" type="url" inputmode="url" required maxlength="2048"
              autocomplete="off" spellcheck="false" aria-describedby="url-help">
            <button id="analyze-button" type="submit">分析</button>
          </div>
          <p id="url-help" class="field-help">僅支援 HTTPS Instagram 貼文或 Reels，以及 X 狀態貼文 URL。</p>
          <p id="privacy-reminder" class="privacy-note">請只下載你有權保存的內容。結果與下載參照僅暫時保留。</p>
        </form>
      </section>

      <div id="status" class="status" role="status" aria-live="polite" hidden></div>

      <section id="results" class="results" aria-labelledby="results-heading" hidden>
        <div class="results-heading">
          <div>
            <div class="section-kicker">02 / 結果</div>
            <p id="platform-label" class="eyebrow"></p>
            <h2 id="results-heading">找到的媒體</h2>
            <p id="post-description" class="post-description"></p>
          </div>
          <a id="source-link" class="source-link" target="_blank" rel="noreferrer noopener"></a>
        </div>
        <p id="results-summary" class="results-summary"></p>
        <p id="unavailable-warning" class="warning" role="status" hidden></p>
        <div id="media-grid" class="media-grid"></div>
      </section>
    </main>

    <footer class="site-footer">不保留歷史記錄。不提供批次封存。僅支援個別下載。</footer>
    <script type="module" src="/app.js"></script>
  </body>
</html>
